#VRML_SIM R2025a utf8

PROTO PendulumBall [
  field SFString   name      "pendulum_ball"
  field SFVec3f    position  0 0 0
  field SFRotation rotation  1 0 0 0
  field SFVec3f    bobOffset  0 0 0
  field SFFloat    radius    0.02
]
{
  Solid {
    name IS name
    translation IS position
    rotation IS rotation   # <-- CRITICAL LINE

    children [
      Transform {
        translation IS bobOffset
        children [
          Shape {
            appearance Appearance {
              material Material {
                diffuseColor 0.70 0.73 0.78
              }
            }
            geometry Sphere {
              radius IS radius
            }
          }
        ]
      }
    ]

    boundingObject Transform {
      translation IS bobOffset
      children [
        Sphere {
          radius IS radius
        }
      ]
    }

    physics Physics {
      density 7850
      mass -1
    }

    contactMaterial "steel"
  }
}
